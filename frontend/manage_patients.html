<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Patients — CareFlow</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --blue:#1a56db;
  --blue-dark:#1746ad;
  --bg:#f4f8ff;
  --white:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
  --green:#0e9f6e;
  --red:#ef4444;
  --orange:#f59e0b;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'DM Sans',sans-serif;
}

body{
  background:var(--bg);
  min-height:100vh;
}

/* HEADER */
header{
  background:white;
  height:70px;
  padding:0 30px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-icon{
  width:40px;
  height:40px;
  border-radius:10px;
  background:var(--blue);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:700;
}

.logo span{
  font-family:'DM Serif Display';
  font-size:24px;
}

.header-title{
  font-size:26px;
  font-weight:800;
  color:var(--blue);
}

/* MAIN */
.container{
  padding:30px;
}

/* TOP BAR */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
  flex-wrap:wrap;
  gap:15px;
}

/* SEARCH */
.search-box{
  background:white;
  padding:12px 16px;
  border-radius:12px;
  border:1px solid var(--border);
  width:320px;
}

.search-box input{
  width:100%;
  border:none;
  outline:none;
  font-size:15px;
}

/* BUTTON */
.add-btn{
  background:var(--blue);
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.add-btn:hover{
  background:var(--blue-dark);
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:25px;
}

.card{
  background:white;
  padding:22px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.card h3{
  color:var(--muted);
  margin-bottom:10px;
}

.card .count{
  font-size:32px;
  font-weight:800;
  color:var(--blue);
}

/* TABLE */
.table-container{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#f8fafc;
  color:var(--text);
  font-size:14px;
  text-align:left;
  padding:16px;
}

td{
  padding:16px;
  border-top:1px solid var(--border);
  font-size:14px;
}

tr:hover{
  background:#f8fbff;
}

/* BADGES */
.badge{
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
  color:white;
}

.male{
  background:#2563eb;
}

.female{
  background:#ec4899;
}

/* ACTION BUTTONS */
.actions{
  display:flex;
  gap:10px;
}

.btn{
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
}

.btn-view{
  background:var(--green);
  color:white;
}

.btn-delete{
  background:var(--red);
  color:white;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  width:420px;
  background:white;
  border-radius:18px;
  padding:25px;
}

.modal-box h2{
  margin-bottom:20px;
  color:var(--blue);
}

.modal-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.info{
  margin-bottom:14px;
}

.info label{
  display:block;
  font-size:13px;
  color:var(--muted);
  margin-bottom:5px;
}

.info div{
  font-weight:600;
}

.close-btn{
  width:100%;
  margin-top:20px;
  background:var(--blue);
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

.empty{
  padding:40px;
  text-align:center;
  color:var(--muted);
}

@media(max-width:900px){

  .top-bar{
    flex-direction:column;
    align-items:flex-start;
  }

  .search-box{
    width:100%;
  }

  table{
    font-size:12px;
  }

  th,td{
    padding:10px;
  }
}

</style>
</head>

<body>

<!-- HEADER -->
<header>

  <div class="logo">
    <div class="logo-icon">+</div>
    <span>
      Care<span style="color:#1a56db;">Flow</span>
    </span>
  </div>

  <div class="header-title">
    Manage Patients
  </div>

</header>

<!-- MAIN -->
<div class="container">

  <!-- TOP BAR -->
  <div class="top-bar">

    <div class="search-box">
      <input
        type="text"
        id="searchInput"
        placeholder="Search patient..."
        onkeyup="searchPatients()"
      >
    </div>

    <button
      class="add-btn"
      onclick="window.location.href='register.html'"
    >
      + Register Patient
    </button>

  </div>

  <!-- STATS -->
  <div class="stats">

    <div class="card">
      <h3>Total Patients</h3>
      <div class="count" id="totalPatients">0</div>
    </div>

    <div class="card">
      <h3>Male Patients</h3>
      <div class="count" id="malePatients">0</div>
    </div>

    <div class="card">
      <h3>Female Patients</h3>
      <div class="count" id="femalePatients">0</div>
    </div>

  </div>

  <!-- TABLE -->
  <div class="table-container">

    <table>

      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Age</th>
          <th>Gender</th>
          <th>Department</th>
          <th>Time</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="patientsTable">

        <tr>
          <td colspan="7" class="empty">
            Loading patients...
          </td>
        </tr>

      </tbody>

    </table>

  </div>

</div>

<!-- MODAL -->
<div class="modal" id="patientModal">

  <div class="modal-box">

    <h2>Patient Details</h2>

    <div class="modal-grid">

      <div class="info">
        <label>Patient ID</label>
        <div id="mId"></div>
      </div>

      <div class="info">
        <label>Name</label>
        <div id="mName"></div>
      </div>

      <div class="info">
        <label>Age</label>
        <div id="mAge"></div>
      </div>

      <div class="info">
        <label>Gender</label>
        <div id="mGender"></div>
      </div>

      <div class="info">
        <label>Department</label>
        <div id="mDepartment"></div>
      </div>

      <div class="info">
        <label>Registered Time</label>
        <div id="mTime"></div>
      </div>

    </div>

    <button class="close-btn" onclick="closeModal()">
      Close
    </button>

  </div>

</div>

<script>

const API_URL = "http://127.0.0.1:8000";

let allPatients = [];

// =======================
// LOAD PATIENTS
// =======================
async function loadPatients(){

  try{

    const response =
      await fetch(`${API_URL}/patients`);

    allPatients =
      await response.json();

    renderPatients(allPatients);

    updateStats();

  }

  catch(error){

    console.log("Patient Load Error:",error);
  }
}

// =======================
// RENDER PATIENTS
// =======================
function renderPatients(patients){

  const tbody =
    document.getElementById("patientsTable");

  if(patients.length === 0){

    tbody.innerHTML = `
      <tr>
        <td colspan="7" class="empty">
          No patients found
        </td>
      </tr>
    `;

    return;
  }

  tbody.innerHTML =
    patients.map(p => `

      <tr>

        <td>${p.id}</td>

        <td>
          ${p.firstName} ${p.lastName}
        </td>

        <td>${p.age}</td>

        <td>
          <span class="badge ${p.gender.toLowerCase()}">
            ${p.gender}
          </span>
        </td>

        <td>${p.department}</td>

        <td>${p.time}</td>

        <td>

          <div class="actions">

            <button
              class="btn btn-view"
              onclick='viewPatient(${JSON.stringify(p)})'
            >
              View
            </button>

            <button
              class="btn btn-delete"
              onclick="deletePatient('${p.id}')"
            >
              Delete
            </button>

          </div>

        </td>

      </tr>

    `).join("");
}

// =======================
// SEARCH
// =======================
function searchPatients(){

  const query =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

  const filtered =
    allPatients.filter(p =>

      p.firstName.toLowerCase().includes(query) ||

      p.lastName.toLowerCase().includes(query) ||

      p.id.toLowerCase().includes(query) ||

      p.department.toLowerCase().includes(query)
    );

  renderPatients(filtered);
}

// =======================
// UPDATE STATS
// =======================
function updateStats(){

  document.getElementById("totalPatients")
    .textContent = allPatients.length;

  const males =
    allPatients.filter(
      p => p.gender.toLowerCase() === "male"
    ).length;

  const females =
    allPatients.filter(
      p => p.gender.toLowerCase() === "female"
    ).length;

  document.getElementById("malePatients")
    .textContent = males;

  document.getElementById("femalePatients")
    .textContent = females;
}

// =======================
// VIEW MODAL
// =======================
function viewPatient(patient){

  document.getElementById("mId")
    .textContent = patient.id;

  document.getElementById("mName")
    .textContent =
    `${patient.firstName} ${patient.lastName}`;

  document.getElementById("mAge")
    .textContent = patient.age;

  document.getElementById("mGender")
    .textContent = patient.gender;

  document.getElementById("mDepartment")
    .textContent = patient.department;

  document.getElementById("mTime")
    .textContent = patient.time;

  document.getElementById("patientModal")
    .style.display = "flex";
}

// =======================
// CLOSE MODAL
// =======================
function closeModal(){

  document.getElementById("patientModal")
    .style.display = "none";
}

// =======================
// DELETE PATIENT
// =======================
async function deletePatient(patientId){

  const confirmDelete =
    confirm("Delete this patient?");

  if(!confirmDelete) return;

  try{

    await fetch(
      `${API_URL}/delete-patient/${patientId}`,
      {
        method:"DELETE"
      }
    );

    loadPatients();

  }

  catch(error){

    console.log("Delete Error:",error);
  }
}

// =======================
// INITIAL LOAD
// =======================
loadPatients();

setInterval(loadPatients,5000);

</script>

</body>
</html>
