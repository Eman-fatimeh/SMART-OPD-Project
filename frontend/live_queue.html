<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Queue Management — CareFlow</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --blue:#1a56db;
  --bg:#f8faff;
  --border:#e2e8f0;
  --text:#0f172a;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'DM Sans',sans-serif;
}

body{
  background:var(--bg);
  padding:30px;
}

/* HEADER */
.header{
  background:white;
  padding:20px 30px;
  border-radius:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-icon{
  width:42px;
  height:42px;
  background:var(--blue);
  color:white;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:700;
}

.logo span{
  font-family:'DM Serif Display';
  font-size:28px;
}

.header-title h2{
  font-size:30px;
  color:var(--blue);
  margin-bottom:4px;
}

.header-title p{
  color:#64748b;
  font-size:14px;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:25px;
}

.card{
  background:white;
  border-radius:18px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.card h3{
  font-size:15px;
  color:#64748b;
  margin-bottom:10px;
}

.card .count{
  font-size:40px;
  font-weight:700;
  color:var(--blue);
}

/* TABLE */
.table-section{
  background:white;
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.top-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  gap:20px;
}

.search-box input{
  width:320px;
  padding:12px 16px;
  border-radius:12px;
  border:1px solid #dbe2ea;
  outline:none;
}

.search-box input:focus{
  border-color:var(--blue);
}

table{
  width:100%;
  border-collapse:collapse;
}

thead tr{
  background:var(--blue);
  color:white;
}

th,td{
  padding:16px;
  text-align:left;
}

tbody tr{
  border-bottom:1px solid var(--border);
}

tbody tr:hover{
  background:#f1f5ff;
}

.token-badge{
  background:#dbeafe;
  color:#1d4ed8;
  padding:6px 12px;
  border-radius:30px;
  font-weight:700;
}

.status-pill{
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  color:white;
}

.waiting{ background:#f59e0b; }
.consulting{ background:#2563eb; }
.done{ background:#10b981; }

.btn-remove{
  background:#ef4444;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}

.btn-call{
  background:#1a56db;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  margin-right:6px;
}

.empty{
  text-align:center;
  padding:40px;
  color:#64748b;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="logo">
    <div class="logo-icon">+</div>
    <span>Care<span style="color:#1a56db;">Flow</span></span>
  </div>

  <div class="header-title">
    <h2>Queue Management</h2>
    <p>Monitor patient queue and token activity</p>
  </div>

</div>

<!-- STATS -->
<div class="stats">

  <div class="card">
    <h3>Total Queue</h3>
    <div class="count" id="totalQueue">0</div>
  </div>

  <div class="card">
    <h3>Waiting</h3>
    <div class="count" id="waitingCount">0</div>
  </div>

  <div class="card">
    <h3>Completed</h3>
    <div class="count" id="completedCount">0</div>
  </div>

</div>

<!-- TABLE -->
<div class="table-section">

  <div class="top-row">
    <h2>Current Queue</h2>

    <div class="search-box">
      <input type="text" placeholder="Search..." onkeyup="searchQueue(this.value)">
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Token</th>
        <th>Patient</th>
        <th>Department</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="queueBody"></tbody>
  </table>

</div>

<script>

let queueData = JSON.parse(localStorage.getItem("queueData")) || [];
let currentIndex = parseInt(localStorage.getItem("currentQueueIndex")) || 0;

function renderManagementQueue(){

  const tbody = document.getElementById("queueBody");
  tbody.innerHTML = "";

  if(queueData.length === 0){
    tbody.innerHTML = `<tr><td colspan="5" class="empty">No queue available</td></tr>`;
    return;
  }

  queueData.forEach((p,index)=>{

    let status = "waiting";
    let statusText = "Waiting";

    if(index === currentIndex){
      status = "consulting";
      statusText = "In Consult";
    } 
    else if(index < currentIndex){
      status = "done";
      statusText = "Completed";
    }

    tbody.innerHTML += `
      <tr>
        <td><span class="token-badge">${p.token}</span></td>
        <td>${p.name}</td>
        <td>${p.dept}</td>
        <td><span class="status-pill ${status}">${statusText}</span></td>
        <td>
          <button class="btn-call" onclick="callPatient(${index})">Call</button>
          <button class="btn-remove" onclick="removePatient(${index})">Remove</button>
        </td>
      </tr>
    `;
  });

  updateStats();
}

function updateStats(){

  const total = queueData.length;
  const waiting = Math.max(0, total - currentIndex - 1);
  const completed = Math.max(0, currentIndex);

  document.getElementById("totalQueue").innerText = total;
  document.getElementById("waitingCount").innerText = waiting;
  document.getElementById("completedCount").innerText = completed;
}

function callPatient(index){
  currentIndex = index;
  localStorage.setItem("currentQueueIndex", currentIndex);
  renderManagementQueue();
}

function removePatient(index){

  queueData.splice(index,1);
  localStorage.setItem("queueData", JSON.stringify(queueData));

  if(currentIndex >= queueData.length){
    currentIndex = Math.max(0, queueData.length - 1);
    localStorage.setItem("currentQueueIndex", currentIndex);
  }

  renderManagementQueue();
}

function searchQueue(value){

  const rows = document.querySelectorAll("#queueBody tr");

  rows.forEach(row=>{
    row.style.display =
      row.innerText.toLowerCase().includes(value.toLowerCase())
      ? ""
      : "none";
  });
}

document.addEventListener("DOMContentLoaded", renderManagementQueue);

</script>

</body>
</html>
